name: ci
on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - main
env:
  CACHE_BROWSER_PATHS: |
    ~/.cache/puppeteer/chrome
    ~/.cache/ms-playwright

jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
          run_install: false
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run lint
        run: pnpm lint

  run-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
          run_install: false
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Run build
        run: pnpm build

  run-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
        with:
          version: 10.33.0
          run_install: false
      - name: Use Node.js 24
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Restore browser cache
        id: browser_cache
        uses: actions/cache@v5
        with:
          path: ${{ env.CACHE_BROWSER_PATHS }}
          key: ${{ runner.os }}-browser-cache-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install puppeteer
        if: steps.browser_cache.outputs.cache-hit != 'true'
        run: pnpm install:puppeteer
      - name: Install playwright
        if: steps.browser_cache.outputs.cache-hit != 'true'
        run: pnpm install:playwright
      - name: Run test
        run: pnpm run test:ci

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v6
        with:
          use_oidc: true
          verbose: true
